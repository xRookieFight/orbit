name: CI

on:
  push:
    branches: [ development, master ]
  pull_request:
    branches: [ development, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-multilib nasm grub-pc-bin xorriso

      - name: Build Orbit
        run: |
          cd build
          make

